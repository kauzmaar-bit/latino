<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking del Gremio Latino</title>
    
    <!-- Google Fonts: Orbitron for numbers/tech, Rajdhani for text -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        darker: '#0a0a0a',
                        panel: 'rgba(30, 41, 59, 0.5)',
                        neonCyan: '#00f2fe',
                        neonLime: '#a3e635',
                        neonMagenta: '#ff0844',
                    },
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        mono: ['Orbitron', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar and glows */
        body {
            background-color: #121212;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 8, 68, 0.05), transparent 25%);
            color: #e2e8f0;
        }
        
        .glow-title {
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }
        
        /* Checkbox styling */
        .cyber-checkbox {
            appearance: none;
            width: 22px; height: 22px;
            border: 2px solid #334155;
            border-radius: 4px;
            background: rgba(0,0,0,0.5);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .cyber-checkbox:checked {
            background: #a3e635;
            border-color: #a3e635;
            box-shadow: 0 0 10px rgba(163, 230, 53, 0.5);
        }
        .cyber-checkbox:checked::after {
            content: '✔';
            position: absolute;
            color: #000;
            font-size: 14px;
            font-weight: 900;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Top 3 Ranks Borders */
        .rank-1 { border-left: 4px solid #fbbf24; background: linear-gradient(90deg, rgba(251,191,36,0.15) 0%, transparent 100%); }
        .rank-2 { border-left: 4px solid #e2e8f0; background: linear-gradient(90deg, rgba(226,232,240,0.1) 0%, transparent 100%); }
        .rank-3 { border-left: 4px solid #b45309; background: linear-gradient(90deg, rgba(180,83,9,0.1) 0%, transparent 100%); }

        /* Hide scrollbar for clean UI but allow scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Mobile cards logic */
        @media (max-width: 767px) {
            thead { display: none; }
            .mobile-card {
                display: block;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 12px;
                margin-bottom: 1rem;
                padding: 1rem;
                background: var(--tw-colors-darker);
            }
            .mobile-cell {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.5rem 0;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            .mobile-cell:last-child { border-bottom: none; }
            .mobile-cell::before {
                content: attr(data-label);
                font-weight: 700;
                color: #94a3b8;
                font-size: 0.75rem;
                text-transform: uppercase;
            }
            .nombre-container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: rgba(0, 242, 254, 0.1);
                border: 1px solid rgba(0, 242, 254, 0.2);
                border-radius: 8px;
                padding: 0.75rem;
                margin-bottom: 1rem;
            }
            .nombre-container::before { display: none; }
            .history-cell { display: none !important; }
            .mobile-card.show-history .history-cell { display: flex !important; }
        }
        
        /* Desktop specific */
        @media (min-width: 768px) {
            .mobile-card { display: table-row; }
            .mobile-cell { display: table-cell; }
            .nombre-container { 
                position: sticky; left: 0; z-index: 10;
                background: #121212;
                border-right: 2px solid rgba(255,255,255,0.1);
            }
            .mobile-only-btn { display: none; }
        }
        
        .glass-panel {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen font-sans selection:bg-neonCyan selection:text-black antialiased p-4 md:p-8">

    <header class="mb-8 text-center">
        <h1 class="text-5xl md:text-6xl font-mono font-black text-transparent bg-clip-text bg-gradient-to-r from-neonCyan via-white to-neonMagenta glow-title tracking-widest uppercase mb-2">LATINO</h1>
        <p class="text-slate-400 text-lg font-mono tracking-widest">RANKING OFICIAL - TOWER</p>
    </header>

    <!-- Info Banner -->
    <div class="max-w-6xl mx-auto mb-6 bg-slate-800/40 border border-neonCyan/30 rounded-lg p-4 flex items-center gap-4 shadow-[0_0_15px_rgba(0,242,254,0.1)]">
        <div class="text-2xl">💡</div>
        <div class="text-sm md:text-base text-slate-300">
            <strong class="text-neonCyan font-mono tracking-wide">MODO BATALLA:</strong> Selecciona de 2 a 3 jugadores usando las casillas junto a sus nombres para abrir un panel de comparación directa.
        </div>
    </div>

    <!-- Controls -->
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 mb-8 glass-panel p-4 md:p-6 rounded-2xl shadow-xl">
        <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
            <span class="font-bold text-slate-300 font-mono tracking-wider">ORDENAR POR:</span>
            <div class="flex bg-slate-900/80 rounded-full p-1 border border-slate-700 w-full md:w-auto">
                <input type="radio" id="sort-tier" name="sortMode" value="tier" checked class="hidden" onchange="handleSortChange()">
                <label for="sort-tier" class="sort-label flex-1 text-center cursor-pointer px-6 py-2 rounded-full font-bold text-slate-400 transition-all duration-300 hover:text-white">🏆 TIER</label>
                
                <input type="radio" id="sort-torneo" name="sortMode" value="torneo" class="hidden" onchange="handleSortChange()">
                <label for="sort-torneo" class="sort-label flex-1 text-center cursor-pointer px-6 py-2 rounded-full font-bold text-slate-400 transition-all duration-300 hover:text-white">⚔️ TORNEO</label>
            </div>
        </div>
        <button id="compareBtn" onclick="toggleComparison()" class="hidden md:block border border-slate-600 hover:border-neonMagenta hover:text-neonMagenta text-slate-300 px-6 py-2 rounded-full font-bold transition-all duration-300 font-mono">
            👁️ MOSTRAR ANTERIOR
        </button>
    </div>

    <!-- Table Container -->
    <div class="max-w-6xl mx-auto glass-panel rounded-2xl overflow-x-auto shadow-2xl">
        <table class="w-full text-left whitespace-nowrap border-collapse">
            <thead class="bg-darker/95 backdrop-blur z-20 text-slate-400 font-mono text-xs md:text-sm tracking-wider uppercase border-b border-slate-700 sticky top-0">
                <tr id="thead1"></tr>
                <tr id="thead2"></tr>
            </thead>
            <tbody id="tbody" class="font-semibold text-sm md:text-base"></tbody>
        </table>
    </div>

    <!-- Floating Battle Button -->
    <button id="battleBtn" onclick="openBattleModal()" class="fixed bottom-8 left-1/2 -translate-x-1/2 translate-y-[150%] bg-gradient-to-r from-neonMagenta to-red-600 text-white border-2 border-red-400 px-8 py-3 rounded-full font-mono font-black tracking-widest text-lg shadow-[0_0_20px_rgba(255,8,68,0.6)] z-50 transition-all duration-500 hover:scale-105 hover:shadow-[0_0_30px_rgba(255,8,68,0.8)]">
        ⚔️ BATALLA
    </button>

    <!-- Profile Modal -->
    <div id="profileModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[1000] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300" onclick="closeModal('profileModal', event)">
        <div class="relative max-w-sm w-full bg-darker border border-neonCyan/50 rounded-2xl p-2 shadow-[0_0_40px_rgba(0,242,254,0.3)] transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
            <button onclick="closeModal('profileModal', event)" class="absolute -top-4 -right-4 bg-red-500 text-white w-10 h-10 rounded-full font-bold text-xl flex items-center justify-center hover:bg-red-600 shadow-lg z-[1001] border-2 border-white">&times;</button>
            <div class="rounded-xl overflow-hidden bg-black flex justify-center items-center">
                <img id="modalImg" src="" alt="Perfil" class="w-full h-auto object-contain max-h-[85vh]">
            </div>
        </div>
    </div>
    
    <!-- Battle Modal -->
    <div id="battleModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[1000] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300" onclick="closeModal('battleModal', event)">
        <div class="relative w-full max-w-5xl max-h-[95vh] flex flex-col bg-darker border border-neonMagenta/50 rounded-3xl p-6 shadow-[0_0_50px_rgba(255,8,68,0.3)] transform scale-95 transition-transform duration-300 overflow-hidden" onclick="event.stopPropagation()">
            <button onclick="closeModal('battleModal', event)" class="absolute -top-3 -right-3 md:top-4 md:right-4 bg-red-500 text-white w-10 h-10 md:w-12 md:h-12 rounded-full font-bold text-xl flex items-center justify-center hover:bg-red-600 shadow-lg z-[1001] border-2 border-white">&times;</button>
            
            <h2 class="text-3xl md:text-4xl font-mono font-black text-center mb-6 text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-neonMagenta uppercase tracking-widest drop-shadow-md">Modo Batalla</h2>
            
            <div class="flex-1 overflow-y-auto no-scrollbar">
                <div class="flex flex-col md:flex-row gap-6 md:gap-8 justify-center" id="battleGrid"></div>
            </div>
        </div>
    </div>

    <!-- Import data -->
    <script src="data.js"></script>
    <script>
        // Use Alpine.js concepts but with Vanilla JS for simplicity
        let currentSortMode = 'tier';
        let showComparison = false;
        let selectedPlayers = new Set();
        
        const prevDateIdx = 29; 
        const currDateIdx = 34; 
        
        const leagueValues = {
            'leyenda': 6, 'campeón': 5, 'campeon': 5,
            'platino': 4, 'oro': 3, 'plata': 2, 'cobre': 1
        };

        // Custom CSS injection for dynamic sort buttons
        const styleEl = document.createElement('style');
        document.head.appendChild(styleEl);
        function updateSortBtnStyles() {
            styleEl.innerHTML = `
                input[value="${currentSortMode}"]:checked + label {
                    background: #22d3ee; color: #000; box-shadow: 0 0 15px rgba(34,211,238,0.5);
                }
            `;
        }
        updateSortBtnStyles();

        function getScore(row, baseIndex) {
            let tier = parseInt(row[baseIndex]) || 0;
            let oleada = parseInt(row[baseIndex+1]) || 0;
            let reliquias = parseInt(row[baseIndex+2]) || 0;
            let ligaStr = (row[baseIndex+3] || "").toLowerCase();
            let liga = leagueValues[ligaStr] || 0;
            let pos = parseInt(row[baseIndex+4]) || 9999;
            let valid = row[baseIndex] && row[baseIndex] !== '-';
            let ligaRaw = row[baseIndex+3] || '-';
            let posRaw = row[baseIndex+4] || '-';
            return { tier, oleada, reliquias, liga, pos, valid, ligaRaw, posRaw };
        }
        
        function compareScores(a, b, mode) {
            if (mode === 'tier') {
                if (a.tier !== b.tier) return b.tier - a.tier;
                if (a.oleada !== b.oleada) return b.oleada - a.oleada;
                return b.reliquias - a.reliquias;
            } else {
                if (a.liga !== b.liga) return b.liga - a.liga;
                if (a.pos !== b.pos) return a.pos - b.pos; 
                return b.reliquias - a.reliquias;
            }
        }

        function calculateRanks(dateIndex, mode) {
            let validRows = db.rows.map(row => ({
                name: row[0], score: getScore(row, dateIndex)
            })).filter(x => x.score.valid);
            validRows.sort((a, b) => compareScores(a.score, b.score, mode));
            let ranks = new Map();
            validRows.forEach((item, index) => ranks.set(item.name, index + 1));
            return ranks;
        }

        function getBadgeClass(val) {
            let v = String(val).toLowerCase();
            if (v === 'leyenda') return 'bg-gradient-to-r from-red-600 to-red-900 text-white shadow-[0_0_8px_rgba(220,38,38,0.6)]';
            if (v === 'oro') return 'bg-gradient-to-r from-amber-500 to-amber-700 text-white shadow-[0_0_8px_rgba(245,158,11,0.5)]';
            if (v === 'platino') return 'bg-gradient-to-r from-sky-400 to-sky-600 text-white shadow-[0_0_8px_rgba(56,189,248,0.5)]';
            if (v === 'campeón' || v === 'campeon') return 'bg-gradient-to-r from-purple-500 to-purple-800 text-white shadow-[0_0_8px_rgba(168,85,247,0.5)]';
            if (v === 'plata') return 'bg-gradient-to-r from-slate-400 to-slate-600 text-white';
            if (v === 'cobre') return 'bg-gradient-to-r from-orange-600 to-orange-800 text-white';
            return 'bg-slate-800 text-slate-400 border border-slate-700';
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        function toggleComparison() {
            showComparison = !showComparison;
            let btn = document.getElementById('compareBtn');
            if (showComparison) {
                btn.classList.add('border-neonCyan', 'text-neonCyan', 'shadow-[0_0_10px_rgba(0,242,254,0.3)]');
                btn.innerHTML = '👁️ OCULTAR ANTERIOR';
            } else {
                btn.classList.remove('border-neonCyan', 'text-neonCyan', 'shadow-[0_0_10px_rgba(0,242,254,0.3)]');
                btn.innerHTML = '👁️ MOSTRAR ANTERIOR';
            }
            renderTable();
        }
        
        function toggleMobileHistory(btn) {
            let tr = btn.closest('tr');
            if (tr.classList.contains('show-history')) {
                tr.classList.remove('show-history');
                btn.innerHTML = '👁️ VER HISTORIAL ANTERIOR';
                btn.classList.remove('bg-neonCyan/20', 'text-neonCyan', 'border-neonCyan');
            } else {
                tr.classList.add('show-history');
                btn.innerHTML = '👁️ OCULTAR HISTORIAL';
                btn.classList.add('bg-neonCyan/20', 'text-neonCyan', 'border-neonCyan');
            }
        }

        function showModalEl(modal) {
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            modal.querySelector('.transform').classList.remove('scale-95');
        }
        function hideModalEl(modal) {
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function openModal(playerName) {
            const modal = document.getElementById('profileModal');
            const img = document.getElementById('modalImg');
            img.src = `Captura-perfiles/${playerName}.png`;
            showModalEl(modal);
        }

        function closeModal(modalId, event) {
            hideModalEl(document.getElementById(modalId));
        }
        
        function handleCheckbox(cb, playerName) {
            if (cb.checked) {
                if (selectedPlayers.size >= 3) {
                    cb.checked = false;
                    alert("⚔️ Solo puedes comparar hasta 3 jugadores a la vez.");
                    return;
                }
                selectedPlayers.add(playerName);
            } else {
                selectedPlayers.delete(playerName);
            }
            
            const battleBtn = document.getElementById('battleBtn');
            if (selectedPlayers.size >= 2) {
                battleBtn.classList.remove('translate-y-[150%]');
                battleBtn.classList.add('translate-y-0');
            } else {
                battleBtn.classList.add('translate-y-[150%]');
                battleBtn.classList.remove('translate-y-0');
            }
        }
        
        function openBattleModal() {
            if (selectedPlayers.size < 2) return;
            const grid = document.getElementById('battleGrid');
            grid.innerHTML = '';
            
            let playersArray = Array.from(selectedPlayers);
            let rowsToCompare = db.rows.filter(r => playersArray.includes(r[0]));
            
            // Define colors for each player card (Cyan vs Magenta vs Lime)
            const colors = ['border-neonCyan shadow-[0_0_20px_rgba(0,242,254,0.2)]', 'border-neonMagenta shadow-[0_0_20px_rgba(255,8,68,0.2)]', 'border-neonLime shadow-[0_0_20px_rgba(163,230,53,0.2)]'];
            const textColors = ['text-neonCyan', 'text-neonMagenta', 'text-neonLime'];
            
            rowsToCompare.forEach((row, idx) => {
                let pName = row[0];
                let score = getScore(row, currDateIdx);
                let theme = colors[idx % colors.length];
                let tc = textColors[idx % textColors.length];
                
                let div = document.createElement('div');
                div.className = `flex-1 bg-black border-2 ${theme} rounded-2xl p-4 md:p-6 min-w-[280px]`;
                
                let badgeHtml = score.ligaRaw !== '-' ? `<span class="px-3 py-1 rounded-full text-xs font-bold ${getBadgeClass(score.ligaRaw)}">${score.ligaRaw}</span>` : '-';
                
                div.innerHTML = `
                    <h3 class="text-2xl font-mono font-bold text-center mb-4 ${tc} uppercase tracking-wider">${pName}</h3>
                    <div class="rounded-xl overflow-hidden border border-slate-800 mb-6 bg-slate-900 aspect-square flex items-center justify-center">
                        <img src="Captura-perfiles/${pName}.png" onerror="this.src=''" alt="${pName}" class="w-full h-full object-cover opacity-90 hover:opacity-100 transition-opacity">
                    </div>
                    <div class="space-y-3 font-mono text-sm md:text-base">
                        <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                            <span class="text-slate-400">🏆 TIER</span> <span class="font-bold text-white">${score.tier || '-'}</span>
                        </div>
                        <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                            <span class="text-slate-400">🌊 OLEADA</span> <span class="font-bold text-white">${score.oleada || '-'}</span>
                        </div>
                        <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                            <span class="text-slate-400">💎 RELIQUIAS</span> <span class="font-bold text-white">${score.reliquias ? formatNumber(score.reliquias) : '-'}</span>
                        </div>
                        <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                            <span class="text-slate-400">🛡️ LIGA</span> <span>${badgeHtml}</span>
                        </div>
                        <div class="flex justify-between items-center pb-2 border-b border-slate-800">
                            <span class="text-slate-400">📍 POSICIÓN</span> <span class="font-bold text-white">${score.posRaw}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });
            
            showModalEl(document.getElementById('battleModal'));
        }

        function renderTable() {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            
            const prevRanks = calculateRanks(prevDateIdx, currentSortMode);
            const currRanks = calculateRanks(currDateIdx, currentSortMode);
            
            let displayRows = [...db.rows];
            displayRows.sort((a, b) => {
                let scoreA = getScore(a, currDateIdx);
                let scoreB = getScore(b, currDateIdx);
                return compareScores(scoreA, scoreB, currentSortMode);
            });
            
            let colToDate = [];
            let currD = "";
            let currDateCols = [];
            let prevDateCols = [];
            
            for(let i=0; i<db.headers_1.length; i++) {
                if(db.headers_1[i].trim() !== "") currD = db.headers_1[i].trim();
                colToDate[i] = currD;
                if (currD === '15-06-2026') currDateCols.push(i);
                if (currD === '26-04-2026') prevDateCols.push(i);
            }
            
            let colsToShow = [0]; 
            colsToShow.push(...currDateCols);
            colsToShow.push(...prevDateCols); // Hidden on mobile via CSS until button is clicked
            
            const thead1 = document.getElementById('thead1');
            const thead2 = document.getElementById('thead2');
            thead1.innerHTML = '';
            thead2.innerHTML = '';
            
            // Header 1
            let th1 = document.createElement('th');
            th1.className = 'nombre-header py-3 px-4';
            thead1.appendChild(th1);
            
            let currTh = document.createElement('th');
            currTh.colSpan = currDateCols.length;
            currTh.textContent = "ACTUAL (15-06-2026)";
            currTh.className = 'py-3 px-4 text-neonCyan font-bold tracking-widest bg-cyan-900/10 border-r border-slate-700 text-center';
            thead1.appendChild(currTh);
            
            let prevTh = document.createElement('th');
            prevTh.colSpan = prevDateCols.length;
            prevTh.textContent = "ANTERIOR (26-04-2026)";
            prevTh.className = `py-3 px-4 text-slate-400 font-bold tracking-widest bg-slate-900/30 text-center ${showComparison ? '' : 'hidden md:hidden'}`;
            thead1.appendChild(prevTh);
            
            // Header 2
            for (let i of colsToShow) {
                if (i === 0) {
                    let th = document.createElement('th');
                    th.textContent = "JUGADOR";
                    th.className = 'nombre-header py-3 px-4';
                    thead2.appendChild(th);
                } else {
                    let th = document.createElement('th');
                    th.textContent = db.headers_2[i];
                    
                    let isPrevCol = colToDate[i] === '26-04-2026';
                    let isNewCol = colToDate[i] === '15-06-2026';
                    
                    let cls = 'py-3 px-4 text-center ';
                    if (isPrevCol && !showComparison) cls += 'hidden md:hidden ';
                    if (isNewCol) cls += 'bg-cyan-900/10 border-r border-slate-700/50 text-cyan-100 ';
                    else cls += 'text-slate-400 ';
                    
                    th.className = cls;
                    thead2.appendChild(th);
                }
            }

            // Body
            displayRows.forEach((row) => {
                let tr = document.createElement('tr');
                tr.className = 'mobile-card even:bg-slate-800/30 hover:bg-slate-800/60 transition-colors border-b border-slate-800/50';
                
                let playerName = row[0];
                let isChecked = selectedPlayers.has(playerName) ? 'checked' : '';
                
                let cRank = currRanks.get(playerName) || '-';
                let pRank = prevRanks.get(playerName);
                
                // Top 3 Ranking Highlights
                if (cRank === 1) tr.classList.add('rank-1');
                else if (cRank === 2) tr.classList.add('rank-2');
                else if (cRank === 3) tr.classList.add('rank-3');
                
                for (let i of colsToShow) {
                    let td = document.createElement('td');
                    td.className = 'mobile-cell py-3 px-4 text-center ';
                    
                    let isNewCol = colToDate[i] === '15-06-2026';
                    let isPrevCol = colToDate[i] === '26-04-2026';
                    
                    if (isNewCol) td.classList.add('bg-cyan-900/5', 'md:border-r', 'md:border-slate-800/50');
                    if (isPrevCol) {
                        td.classList.add('history-cell', 'text-slate-400');
                        if (!showComparison) td.classList.add('md:hidden');
                    }
                    
                    let dateSuffix = isNewCol ? ' (Actual)' : ' (Ant.)';
                    td.setAttribute('data-label', db.headers_2[i] + dateSuffix);
                    
                    if (i === 0) {
                        td.className = 'nombre-container';
                        
                        let trendHtml = '';
                        if (!pRank && cRank !== '-') {
                            trendHtml = `<span class="bg-amber-500/20 text-amber-500 border border-amber-500/30 px-2 py-0.5 rounded font-bold text-xs uppercase tracking-wider">NEW</span>`;
                        } else if (pRank && cRank !== '-') {
                            if (cRank < pRank) {
                                trendHtml = `<span class="bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-0.5 rounded font-bold text-xs">▲ ${pRank - cRank}</span>`;
                            } else if (cRank > pRank) {
                                trendHtml = `<span class="bg-red-500/20 text-red-400 border border-red-500/30 px-2 py-0.5 rounded font-bold text-xs">▼ ${cRank - pRank}</span>`;
                            } else {
                                trendHtml = `<span class="text-slate-500 px-2 py-0.5 font-bold text-xs">-</span>`;
                            }
                        }
                        
                        let rankStr = cRank !== '-' ? `#${cRank}` : '-';
                        let rankColor = 'text-white';
                        if(cRank === 1) rankColor = 'text-yellow-400';
                        if(cRank === 2) rankColor = 'text-slate-300';
                        if(cRank === 3) rankColor = 'text-amber-600';
                        
                        td.innerHTML = `
                            <div class="flex items-center gap-3">
                                <input type="checkbox" class="cyber-checkbox" value="${playerName}" onchange="handleCheckbox(this, '${playerName}')" ${isChecked}>
                                <span class="font-mono font-black text-lg ${rankColor} w-8 text-center">${rankStr}</span>
                                ${trendHtml}
                                <span class="font-bold text-base tracking-wide">${playerName}</span>
                            </div>
                            <button class="bg-neonCyan/10 border border-neonCyan/30 text-neonCyan hover:bg-neonCyan hover:text-black px-3 py-1 rounded transition-colors text-xs font-bold uppercase tracking-wider ml-auto flex items-center gap-1" onclick="openModal('${playerName}')">
                                👤 <span class="hidden md:inline">Perfil</span>
                            </button>
                        `;
                    } 
                    else {
                        let headerType = db.headers_2[i].toLowerCase();
                        if (headerType.includes('liga') && row[i] !== '-') {
                            td.innerHTML = `<span class="px-3 py-1 rounded-full text-xs font-bold tracking-wider ${getBadgeClass(row[i])}">${row[i]}</span>`;
                        } else if (headerType.includes('reliquias') && row[i] !== '-') {
                            td.innerHTML = `<span class="font-mono text-neonCyan">${formatNumber(row[i])}</span>`;
                        } else if (headerType.includes('tier') || headerType.includes('oleada')) {
                            td.innerHTML = `<span class="font-mono font-bold">${row[i]}</span>`;
                        } else {
                            td.textContent = row[i];
                        }
                    }
                    tr.appendChild(td);
                }
                
                let btnTd = document.createElement('td');
                btnTd.className = 'mobile-only-btn px-4 pb-4 pt-2 border-t border-slate-800/50 mt-2';
                btnTd.innerHTML = `<button class="w-full bg-slate-800 border border-slate-600 text-slate-300 hover:text-white py-2 rounded-lg font-bold font-mono tracking-wider transition-all" onclick="toggleMobileHistory(this)">👁️ VER HISTORIAL ANTERIOR</button>`;
                tr.appendChild(btnTd);
                
                tbody.appendChild(tr);
            });
        }

        function handleSortChange() {
            let radios = document.getElementsByName('sortMode');
            for(let r of radios) {
                if(r.checked) {
                    currentSortMode = r.value;
                    break;
                }
            }
            updateSortBtnStyles();
            renderTable();
        }
        
        window.addEventListener('resize', () => {
            // Re-render purely to ensure hidden columns logic applies perfectly on resize breakpoint
            renderTable();
        });
        
        renderTable();

    </script>
</body>
</html>
